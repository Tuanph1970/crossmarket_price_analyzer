global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'cma-services'
    static_configs:
      - targets:
          - 'product-api:8080'
          - 'matching-api:8080'
          - 'scoring-api:8080'
          - 'notification-api:8080'
          - 'gateway:8080'
    metrics_path: /metrics
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
