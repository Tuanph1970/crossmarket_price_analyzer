name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io/${{ github.repository }}
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20'

jobs:
  # ─── Build & Push Docker Images ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      # Build all .NET service images
      - name: Build product-api
        uses: docker/build-push-action@v5
        with:
          context: ./src/Services/ProductService/ProductService.Api
          push: true
          tags: ${{ env.REGISTRY }}/product-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build matching-api
        uses: docker/build-push-action@v5
        with:
          context: ./src/Services/MatchingService/MatchingService.Api
          push: true
          tags: ${{ env.REGISTRY }}/matching-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build scoring-api
        uses: docker/build-push-action@v5
        with:
          context: ./src/Services/ScoringService/ScoringService.Api
          push: true
          tags: ${{ env.REGISTRY }}/scoring-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build notification-api
        uses: docker/build-push-action@v5
        with:
          context: ./src/Services/NotificationService/NotificationService.Api
          push: true
          tags: ${{ env.REGISTRY }}/notification-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build scraping-worker
        uses: docker/build-push-action@v5
        with:
          context: ./src/Services/ScrapingService/ScrapingService.Worker
          push: true
          tags: ${{ env.REGISTRY }}/scraping-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build gateway
        uses: docker/build-push-action@v5
        with:
          context: ./src/Apps/CMA.Gateway
          push: true
          tags: ${{ env.REGISTRY }}/gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./src/Apps/CMA.WebApp
          push: true
          tags: ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Create deployment marker
        run: |
          echo "CMA_IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Deploy to staging via SSH
        env:
          SSH_HOST: ${{ secrets.STAGING_HOST }}
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
        run: |
          set -e
          echo "$SSH_KEY" | tr -d '\r' > ~/staging_key
          chmod 600 ~/staging_key

          # Stop existing containers, pull new images, start
          ssh -o StrictHostKeyChecking=no -i ~/staging_key "${SSH_USER}@${SSH_HOST}" << 'REMOTE_SCRIPT'
            set -e
            export IMAGE_TAG="${{ github.sha }}"
            export REGISTRY="${{ env.REGISTRY }}"
            export COMPOSE_FILE="/opt/cma/docker-compose.prod.yml"

            # Create production compose override pointing to new images
            cat > /opt/cma/docker-compose.prod.yml << 'EOF'
            version: '3.9'
            services:
              product-api:
                image: ${REGISTRY}/product-api:${IMAGE_TAG}
              matching-api:
                image: ${REGISTRY}/matching-api:${IMAGE_TAG}
              scoring-api:
                image: ${REGISTRY}/scoring-api:${IMAGE_TAG}
              notification-api:
                image: ${REGISTRY}/notification-api:${IMAGE_TAG}
              scraping-worker:
                image: ${REGISTRY}/scraping-worker:${IMAGE_TAG}
              gateway:
                image: ${REGISTRY}/gateway:${IMAGE_TAG}
              frontend:
                image: ${REGISTRY}/frontend:${IMAGE_TAG}
            EOF

            cd /opt/cma
            docker compose pull
            docker compose up -d --remove-orphans
            echo "IMAGE_TAG=${IMAGE_TAG}" >> ~/.env
          REMOTE_SCRIPT

      - name: Health check staging
        run: |
          for i in {1..10}; do
            if curl -sf http://${{ secrets.STAGING_HOST }}/health > /dev/null 2>&1; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Waiting for staging... ($i/10)"
            sleep 10
          done
          echo "Staging health check failed"
          exit 1

  # ─── Smoke Tests on Staging ──────────────────────────────────────────────────
  smoke-test-staging:
    name: Smoke Test Staging
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          STAGING_HOST="${{ secrets.STAGING_HOST }}"
          GATEWAY="http://${STAGING_HOST}"

          echo "Testing gateway health..."
          curl -sf "${GATEWAY}/health" || exit 1

          echo "Testing product-api health..."
          curl -sf "http://${STAGING_HOST}:5001/health" || exit 1

          echo "Testing matching-api health..."
          curl -sf "http://${STAGING_HOST}:5002/health" || exit 1

          echo "Testing scoring-api health..."
          curl -sf "http://${STAGING_HOST}:5003/health" || exit 1

          echo "Testing notification-api health..."
          curl -sf "http://${STAGING_HOST}:5004/health" || exit 1

          echo "All smoke tests passed"

  # ─── Deploy to Production (requires manual approval) ─────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [smoke-test-staging, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    # Gate: only on main branch push, not on workflow_dispatch to staging only
    if: github.ref == 'refs/heads/main' && github.event_name != 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production via SSH
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
        run: |
          set -e
          echo "$SSH_KEY" | tr -d '\r' > ~/production_key
          chmod 600 ~/production_key

          ssh -o StrictHostKeyChecking=no -i ~/production_key "${SSH_USER}@${SSH_HOST}" << 'REMOTE_SCRIPT'
            set -e
            export IMAGE_TAG="${{ github.sha }}"
            export REGISTRY="${{ env.REGISTRY }}"
            export COMPOSE_FILE="/opt/cma/docker-compose.prod.yml"

            cat > /opt/cma/docker-compose.prod.yml << 'EOF'
            version: '3.9'
            services:
              product-api:
                image: ${REGISTRY}/product-api:${IMAGE_TAG}
              matching-api:
                image: ${REGISTRY}/matching-api:${IMAGE_TAG}
              scoring-api:
                image: ${REGISTRY}/scoring-api:${IMAGE_TAG}
              notification-api:
                image: ${REGISTRY}/notification-api:${IMAGE_TAG}
              scraping-worker:
                image: ${REGISTRY}/scraping-worker:${IMAGE_TAG}
              gateway:
                image: ${REGISTRY}/gateway:${IMAGE_TAG}
              frontend:
                image: ${REGISTRY}/frontend:${IMAGE_TAG}
            EOF

            cd /opt/cma
            docker compose pull
            docker compose up -d --remove-orphans
          REMOTE_SCRIPT

      - name: Health check production
        run: |
          for i in {1..15}; do
            if curl -sf http://${{ secrets.PRODUCTION_HOST }}/health > /dev/null 2>&1; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Waiting for production... ($i/15)"
            sleep 10
          done
          echo "Production health check failed"
          exit 1
