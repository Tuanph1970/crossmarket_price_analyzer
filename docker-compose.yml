services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cma-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: cma_products
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cma-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: cma-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Services ──────────────────────────────────────────────────────────
  product-api:
    build:
      context: .
      dockerfile: src/Services/ProductService/ProductService.Api/Dockerfile
    container_name: cma-product-api
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=cma_products;User=root;Password=rootpassword;
      - RabbitMq__Host=rabbitmq
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./infrastructure/docker/healthcheck.sh:/app/healthcheck.sh:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  matching-api:
    build:
      context: .
      dockerfile: src/Services/MatchingService/MatchingService.Api/Dockerfile
    container_name: cma-matching-api
    restart: unless-stopped
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=cma_matching;User=root;Password=rootpassword;
      - RabbitMq__Host=rabbitmq
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./infrastructure/docker/healthcheck.sh:/app/healthcheck.sh:ro
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  scoring-api:
    build:
      context: .
      dockerfile: src/Services/ScoringService/ScoringService.Api/Dockerfile
    container_name: cma-scoring-api
    restart: unless-stopped
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=cma_scoring;User=root;Password=rootpassword;
      - RabbitMq__Host=rabbitmq
    # ScoringService exposes /api/scores/websocket/health instead of /health — use TCP check
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /api/scores/websocket/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 3 cat <&3 | grep -q '200'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./infrastructure/docker/healthcheck.sh:/app/healthcheck.sh:ro
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-api:
    build:
      context: .
      dockerfile: src/Services/NotificationService/NotificationService.Api/Dockerfile
    container_name: cma-notification-api
    restart: unless-stopped
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=cma_notifications;User=root;Password=rootpassword;
      - RabbitMq__Host=rabbitmq
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./infrastructure/docker/healthcheck.sh:/app/healthcheck.sh:ro
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  auth-api:
    build:
      context: .
      dockerfile: src/Services/AuthService/AuthService.Api/Dockerfile
    container_name: cma-auth-api
    restart: unless-stopped
    ports:
      - "5005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./infrastructure/docker/healthcheck.sh:/app/healthcheck.sh:ro
    depends_on:
      mysql:
        condition: service_healthy

  scraping-worker:
    build:
      context: .
      dockerfile: src/Services/ScrapingService/ScrapingService.Worker/Dockerfile
    container_name: cma-scraping-worker
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=cma_scraping;User=root;Password=rootpassword;
      - Redis__ConnectionString=redis:6379
      - RabbitMq__Host=rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "grep -q dotnet /proc/1/stat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Gateway & Frontend ────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: src/Apps/CMA.Gateway/Dockerfile
    container_name: cma-gateway
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./infrastructure/docker/healthcheck.sh:/app/healthcheck.sh:ro
    depends_on:
      - product-api
      - matching-api
      - scoring-api
      - notification-api

  frontend:
    build:
      context: .
      dockerfile: src/Apps/CMA.WebApp/Dockerfile
    container_name: cma-frontend
    restart: unless-stopped
    ports:
      - "3003:80"
    depends_on:
      - gateway

  # ─── Observability (Optional) ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: cma-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    profiles:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: cma-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning:ro
    profiles:
      - observability

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  grafana_data:
  prometheus_data:
