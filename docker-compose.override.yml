version: '3.9'
# Development overrides — local builds for faster iteration (no volume mounts to avoid hiding built DLLs)

services:
  product-api:
    build:
      context: .
      dockerfile: src/Services/ProductService/ProductService.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  matching-api:
    build:
      context: .
      dockerfile: src/Services/MatchingService/MatchingService.Api/Dockerfile

  scoring-api:
    build:
      context: .
      dockerfile: src/Services/ScoringService/ScoringService.Api/Dockerfile

  notification-api:
    build:
      context: .
      dockerfile: src/Services/NotificationService/NotificationService.Api/Dockerfile

  scraping-worker:
    build:
      context: .
      dockerfile: src/Services/ScrapingService/ScrapingService.Worker/Dockerfile

  gateway:
    build:
      context: .
      dockerfile: src/Apps/CMA.Gateway/Dockerfile
